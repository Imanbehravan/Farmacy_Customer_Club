services:
  db:
    image: postgres:15-alpine
    container_name: pharmacy_db
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-pharmacy_club}
      POSTGRES_USER: ${POSTGRES_USER:-pharmacy_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pharmacy_pass_2024}
    networks:
      - pharmacy_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pharmacy_user} -d ${POSTGRES_DB:-pharmacy_club}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: pharmacy_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - pharmacy_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pharmacy_web
    restart: always
    command: >
      sh -c "python manage.py makemigrations &&
             python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 config.asgi:application"
    volumes:
      - .:/app
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pharmacy_network

  nginx:
    image: nginx:1.25-alpine
    container_name: pharmacy_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    depends_on:
      - web
    networks:
      - pharmacy_network

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  pharmacy_network:
    driver: bridge